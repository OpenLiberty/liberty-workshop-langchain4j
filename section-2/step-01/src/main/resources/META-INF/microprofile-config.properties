# LangChain4J Configuration for MicroProfile Config 3.1
# These properties can be overridden by environment variables or system properties

# dev.langchain4j.cdi.plugin.cleaning-agent.config.base-url=http://localhost:11434/v1
dev.langchain4j.cdi.plugin.cleaning-agent.class=dev.langchain4j.model.openai.OpenAiChatModel
dev.langchain4j.cdi.plugin.cleaning-agent.config.api-key=${OPENAI_API_KEY}
dev.langchain4j.cdi.plugin.cleaning-agent.config.model-name=gpt-4o
dev.langchain4j.cdi.plugin.cleaning-agent.config.log-requests=true
dev.langchain4j.cdi.plugin.cleaning-agent.config.log-responses=true
dev.langchain4j.cdi.plugin.cleaning-agent.config.temperature=0.0
dev.langchain4j.cdi.plugin.cleaning-agent.config.max-tokens=2000
dev.langchain4j.cdi.plugin.cleaning-agent.config.frequency-penalty=0

dev.langchain4j.cdi.plugin.cleaning-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.cleaning-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.cleaning-agent-memory.config.maxMessages=20

vector.store.hostname=localhost
vector.store.port=5432
vector.store.database=postgres
vector.store.username=postgres
vector.store.password=password
vector.store.dimension=384

# If you want to use a different provider or run an LLM on your local machine,
# uncomment this line and update the url/port accordingly.
