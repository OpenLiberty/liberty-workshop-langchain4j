# LangChain4J Configuration for MicroProfile Config 3.1
# These properties can be overridden by environment variables or system properties

dev.langchain4j.cdi.plugin.chat-model.class=dev.langchain4j.model.openai.OpenAiChatModel
dev.langchain4j.cdi.plugin.chat-model.config.api-key=${OPENAI_API_KEY}
dev.langchain4j.cdi.plugin.chat-model.config.model-name=gpt-4o
dev.langchain4j.cdi.plugin.chat-model.config.log-requests=true
dev.langchain4j.cdi.plugin.chat-model.config.log-responses=true
dev.langchain4j.cdi.plugin.chat-model.config.temperature=0.0
dev.langchain4j.cdi.plugin.chat-model.config.max-tokens=20000
dev.langchain4j.cdi.plugin.chat-model.config.frequency-penalty=0

dev.langchain4j.cdi.plugin.cleaning-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.cleaning-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.cleaning-agent-memory.config.maxMessages=20

dev.langchain4j.cdi.plugin.car-condition-feedback-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.car-condition-feedback-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.car-condition-feedback-agent-memory.config.maxMessages=20

dev.langchain4j.cdi.plugin.maintenance-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.maintenance-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.maintenance-agent-memory.config.maxMessages=20

dev.langchain4j.cdi.plugin.disposition-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.disposition-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.disposition-agent-memory.config.maxMessages=20

dev.langchain4j.cdi.plugin.pricing-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.pricing-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.pricing-agent-memory.config.maxMessages=20

dev.langchain4j.cdi.plugin.disposition-proposal-agent-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.disposition-proposal-agent-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.disposition-proposal-agent-memory.config.maxMessages=20

# If you want to use a different provider or run an LLM on your local machine,
# uncomment this line and update the url/port accordingly.
# dev.langchain4j.cdi.plugin.chat-model.config.base-url=http://localhost:11434/v1

# If your LLM is hosted by a provider/runtime that does not support HTTP 2, such as LMStudio or vLLM, uncomment this
# line and update the url/port accordingly.
# dev.langchain4j.cdi.plugin.chat-model.config.httpClientBuilder=com.carmanagement.utils.Http11ClientBuilder
